# Generated by klaussy. Aider project config (.aider.conf.yml).
# Aider loads this from the repo root automatically.
#
# Model: point aider at any model. For a local Ollama model:
#   model: ollama_chat/llama3.1
# Start the server with `ollama serve`; set OLLAMA_API_BASE if it isn't on
# http://127.0.0.1:11434. See https://aider.chat/docs/llms/ollama.html

# Load repo conventions read-only on every run.
read:
  - CONVENTIONS.md

# Keep secrets/build artifacts out of aider's view (.gitignore syntax).
aiderignore: .aiderignore

# Lint/test gating — aider's closest analog to a commit guard.
auto-lint: true
lint-cmd:
  - "python: ruff check"
auto-test: false
test-cmd: pytest
